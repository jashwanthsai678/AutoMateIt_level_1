<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Automation Learning Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .level-card {
            transition: all 0.3s;
            cursor: pointer;
        }

            .level-card:hover {
                transform: translateX(5px);
                box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            }

            .level-card.active {
                border-left: 4px solid #667eea;
                background-color: #f8f9ff;
            }

            .level-card.solved {
                border-left: 4px solid #28a745;
                background-color: #f0fff4;
            }

        .code-editor {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
        }

        .output-box {
            background: #2d3748;
            color: #e2e8f0;
            font-family: 'Consolas', 'Monaco', monospace;
            white-space: pre-wrap;
        }

        .complexity-badge {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="game-container">
            <div class="row g-0">
                <!-- Left Panel: Levels -->
                <div class="col-md-3 p-4" style="background: #f8f9fa;">
                    <h3 class="mb-4">🎯 Levels</h3>
                    <div id="levelsList" class="d-grid gap-2">
                        <!-- Levels will be loaded here -->
                    </div>
                    <button onclick="resetGame()" class="btn btn-outline-secondary w-100 mt-4">
                        🔄 Reset Game
                    </button>
                </div>

                <!-- Right Panel: Game Content -->
                <div class="col-md-9 p-4">
                    <!-- Tabs -->
                    <ul class="nav nav-tabs mb-4" id="gameTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="manual-tab" data-bs-toggle="tab"
                                    data-bs-target="#manual" type="button" role="tab">
                                🎮 Manual Guessing
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="auto-tab" data-bs-toggle="tab"
                                    data-bs-target="#auto" type="button" role="tab">
                                🤖 Automated Guessing
                            </button>
                        </li>
                    </ul>

                    <!-- Tab Content -->
                    <div class="tab-content">
                        <!-- Manual Tab -->
                        <div class="tab-pane fade show active" id="manual" role="tabpanel">
                            <h4 id="manualTitle" class="mb-3">Manual Guessing</h4>
                            <div class="alert alert-info" id="manualInstructions">
                                <!-- Instructions will be loaded here -->
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="guessInput" class="form-label">Enter your guess (1-100):</label>
                                    <input type="number" id="guessInput" class="form-control" min="1" max="100">
                                </div>
                            </div>

                            <div class="mb-3">
                                <button onclick="submitGuess()" class="btn btn-primary me-2">Submit Guess</button>
                                <button onclick="revealHint()" class="btn btn-outline-info">Get Hint</button>
                            </div>

                            <div id="manualResult" class="alert" style="display: none;"></div>
                        </div>

                        <!-- Automated Tab -->
                        <div class="tab-pane fade" id="auto" role="tabpanel">
                            <h4 id="autoTitle" class="mb-3">Automated Guessing</h4>
                            <div class="alert alert-info" id="autoInstructions">
                                <!-- Instructions will be loaded here -->
                            </div>

                            <div class="mb-3">
                                <label for="codeEditor" class="form-label">Write your Python-like code:</label>
                                <textarea id="codeEditor" class="form-control code-editor" rows="12"
                                          placeholder="Write your code here..."></textarea>
                            </div>

                            <div class="mb-3">
                                <button onclick="runPythonCode()" class="btn btn-success me-2">▶️ Run Code</button>
                                <button onclick="loadExample()" class="btn btn-outline-secondary me-2">📋 Load Example</button>
                                <button onclick="clearCode()" class="btn btn-outline-danger">🗑️ Clear</button>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Output:</label>
                                <div id="outputBox" class="output-box p-3 rounded" style="min-height: 150px;">
                                    Output will appear here...
                                </div>
                            </div>

                            <div id="complexityResult" class="alert alert-info" style="display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = window.location.origin + '/api/game';
        let currentLevel = 1;
        let levels = [];

        // Load levels on page load
        document.addEventListener('DOMContentLoaded', function () {
            loadLevels();
        });

        async function loadLevels() {
            try {
                showLoading('levelsList', 'Loading levels...');
                const response = await fetch(`${API_BASE_URL}/levels`);
                if (!response.ok) throw new Error('Network response was not ok');

                levels = await response.json();
                displayLevels();
                loadLevel(currentLevel);
            } catch (error) {
                console.error('Error loading levels:', error);
                showError('levelsList', 'Failed to load levels. Please check if server is running.');
            }
        }

        function displayLevels() {
            const levelsList = document.getElementById('levelsList');
            levelsList.innerHTML = levels.map(level => `
                    <div class="level-card card p-3 ${currentLevel === level.levelId ? 'active' : ''} ${level.isSolved ? 'solved' : ''}"
                         onclick="loadLevel(${level.levelId})">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">Level ${level.levelId}: ${level.title}</h6>
                                <p class="text-muted mb-0 small">${level.description}</p>
                            </div>
                            <span class="badge ${level.isSolved ? 'bg-success' : 'bg-warning'}">
                                ${level.isSolved ? '✅ Solved' : '⏳ Pending'}
                            </span>
                        </div>
                    </div>
                `).join('');
        }

        async function loadLevel(levelId) {
            currentLevel = levelId;
            displayLevels();

            try {
                const response = await fetch(`${API_BASE_URL}/level/${levelId}`);
                if (!response.ok) throw new Error('Level not found');

                const level = await response.json();

                // Update manual tab
                document.getElementById('manualTitle').textContent = `Level ${levelId}: ${level.title}`;
                document.getElementById('manualInstructions').innerHTML = `
                        <strong>Instructions:</strong> ${level.instructions}<br>
                        <strong>Task:</strong> Guess the secret number between 1 and 100
                    `;

                // Update auto tab
                document.getElementById('autoTitle').textContent = `Level ${levelId}: ${level.title}`;
                document.getElementById('autoInstructions').innerHTML = `
                        <strong>Instructions:</strong> ${level.instructions}<br>
                        <strong>Task:</strong> Write Python-like pseudocode to automatically find the number.<br>
                        <strong>Note:</strong> This is a simulation. Use standard Python syntax.
                    `;

                clearResults();
                loadExample();
            } catch (error) {
                console.error('Error loading level:', error);
                showError('manualResult', 'Failed to load level details.');
            }
        }

        async function submitGuess() {
            const guessInput = document.getElementById('guessInput');
            const guess = parseInt(guessInput.value);
            const resultDiv = document.getElementById('manualResult');

            if (isNaN(guess) || guess < 1 || guess > 100) {
                showResult(resultDiv, 'Please enter a valid number between 1 and 100', 'danger');
                return;
            }

            try {
                showLoadingButton('submitGuess');
                const response = await fetch(`${API_BASE_URL}/guess`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        levelId: currentLevel,
                        guess: guess
                    })
                });

                const result = await response.json();

                if (result.isCorrect) {
                    showResult(resultDiv, result.message, 'success');
                    guessInput.value = '';
                    loadLevels(); // Refresh levels
                } else {
                    showResult(resultDiv, result.message, 'warning');
                }
            } catch (error) {
                showResult(resultDiv, 'Error submitting guess. Please try again.', 'danger');
            } finally {
                resetLoadingButton('submitGuess', 'Submit Guess');
            }
        }

        async function runPythonCode() {
            const codeEditor = document.getElementById('codeEditor');
            const code = codeEditor.value;
            const outputBox = document.getElementById('outputBox');
            const complexityResult = document.getElementById('complexityResult');

            if (!code.trim()) {
                showResult(complexityResult, 'Please write some code first.', 'warning');
                return;
            }

            try {
                showLoadingButton('runPythonCode');
                outputBox.textContent = 'Executing code...';
                complexityResult.style.display = 'none';

                const response = await fetch(`${API_BASE_URL}/execute`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        levelId: currentLevel,
                        code: code
                    })
                });

                const result = await response.json();

                if (result.isSuccess) {
                    outputBox.textContent = result.output || '(No output generated)';

                    if (result.timeComplexity) {
                        complexityResult.innerHTML = `
                                <strong>⏱️ Time Complexity:</strong> ${result.timeComplexity}<br>
                                ${result.numberFound === true ?
                                '<span class="text-success">✅ Congratulations! Your code found the number!</span>' :
                                result.numberFound === false ?
                                    '<span class="text-warning">❌ Your code ran but did not find the number.</span>' :
                                    '<span class="text-info">ℹ️ Code executed successfully.</span>'}
                            `;
                        complexityResult.style.display = 'block';

                        if (result.numberFound === true) {
                            loadLevels(); // Refresh levels
                        }
                    }
                } else {
                    outputBox.textContent = `Error: ${result.error}`;
                }
            } catch (error) {
                outputBox.textContent = `Network error: ${error.message}`;
            } finally {
                resetLoadingButton('runPythonCode', '▶️ Run Code');
            }
        }

        function loadExample() {
            const codeEditor = document.getElementById('codeEditor');

            const examples = {
                1: `# Linear search example
for i in range(1, 101):
        if i == number:
            print(f'Found the number: {i}')
            break`,

                2: `# More efficient linear search
found = False
for guess in range(1, 101):
        if guess == number:
            print(f'Number found: {guess}')
            found = True
            break
if not found:
        print('Number not found in range')`,

                3: `# Binary search implementation
low = 1
high = 100
attempts = 0

while low <= high:
        mid = (low + high) // 2
        attempts += 1

        if mid == number:
            print(f'Found the number {mid} in {attempts} attempts!')
            break
        elif mid < number:
            low = mid + 1
            print(f'Guess {mid}: Too low')
        else:
            high = mid - 1
            print(f'Guess {mid}: Too high')`
            };

            codeEditor.value = examples[currentLevel] || `# Write your solution here
# The target number is stored in the variable 'number'
# Use standard Python syntax

print("Start your automation code here...")`;
        }

        async function revealHint() {
            const resultDiv = document.getElementById('manualResult');

            try {
                const response = await fetch(`${API_BASE_URL}/level/${currentLevel}`);
                const level = await response.json();

                // Give hints based on the number
                const hints = [];
                if (level.targetNumber % 2 === 0) hints.push("The number is even");
                if (level.targetNumber > 50) hints.push("The number is greater than 50");
                else hints.push("The number is 50 or less");
                if (level.targetNumber % 5 === 0) hints.push("The number is divisible by 5");

                showResult(resultDiv, `💡 Hint: ${hints.join('. ')}`, 'info');
            } catch (error) {
                showResult(resultDiv, 'Could not get hint', 'danger');
            }
        }

        function clearCode() {
            document.getElementById('codeEditor').value = '';
            document.getElementById('outputBox').textContent = 'Output will appear here...';
            document.getElementById('complexityResult').style.display = 'none';
        }

        function clearResults() {
            document.getElementById('manualResult').style.display = 'none';
            document.getElementById('manualResult').className = 'alert';
            document.getElementById('guessInput').value = '';
        }

        async function resetGame() {
            if (confirm('Are you sure you want to reset the game? All progress will be lost.')) {
                try {
                    const response = await fetch(`${API_BASE_URL}/reset`, {
                        method: 'POST'
                    });
                    await loadLevels();
                    clearResults();
                    clearCode();
                    alert('Game has been reset successfully!');
                } catch (error) {
                    alert('Error resetting game: ' + error.message);
                }
            }
        }

        // Helper functions
        function showLoading(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary"></div>
                        <span class="ms-2">${message}</span>
                    </div>`;
            }
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerHTML = `<div class="alert alert-danger">${message}</div>`;
            }
        }

        function showResult(element, message, type) {
            element.innerHTML = message;
            element.className = `alert alert-${type}`;
            element.style.display = 'block';
        }

        function showLoadingButton(buttonFunction) {
            const buttons = {
                'submitGuess': document.querySelector('button[onclick="submitGuess()"]'),
                'runPythonCode': document.querySelector('button[onclick="runPythonCode()"]')
            };

            if (buttons[buttonFunction]) {
                const originalText = buttons[buttonFunction].innerHTML;
                buttons[buttonFunction].innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
                buttons[buttonFunction].disabled = true;
                buttons[buttonFunction].setAttribute('data-original-text', originalText);
            }
        }

        function resetLoadingButton(buttonFunction, defaultText) {
            const buttons = {
                'submitGuess': document.querySelector('button[onclick="submitGuess()"]'),
                'runPythonCode': document.querySelector('button[onclick="runPythonCode()"]')
            };

            if (buttons[buttonFunction]) {
                const originalText = buttons[buttonFunction].getAttribute('data-original-text') || defaultText;
                buttons[buttonFunction].innerHTML = originalText;
                buttons[buttonFunction].disabled = false;
            }
        }
    </script>
</body>
</html>
